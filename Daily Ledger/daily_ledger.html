<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Daily Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ledger">
  <div class="perf"></div>
  <div class="header">
    <div class="eyebrow">Est. today &middot; No. 001</div>
    <h1>The Daily Ledger</h1>
    <div class="date" id="today"></div>
  </div>

  <div class="compose">
    <input type="text" id="taskInput" placeholder="Add a line item…" maxlength="120">
    <button id="addBtn">Enter</button>
  </div>

  <ul class="entries" id="entries"></ul>
  <div class="empty" id="emptyState">Nothing on the books yet.</div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="open">Open</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <div class="tally">
    <span>ITEMS <strong id="totalCount">0</strong></span>
    <span>OPEN <strong id="openCount">0</strong></span>
    <span>DONE <strong id="doneCount">0</strong></span>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
